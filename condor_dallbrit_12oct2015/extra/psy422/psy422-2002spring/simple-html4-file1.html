<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN">

<!-- First, notice that this line does not appear in the browser window -->
<!-- That is because everything between                                 -->
<!-- and -->
<!-- is a comment in HTML.  That means the browser ignores it.          -->

<!-- Second, notice the very first line of the file. That is the        -->
<!-- document type declaration, that tells the browser what kind of     -->
<!-- file this is (HTML 4.01 in this case).  In most                    -->
<!-- cases we will want to use XHTML 1.0 instead, but more on that      -->
<!-- later. -->

<!-- Notice that the part below begins with <html> and ends with </html> -->
<!-- These are the TAGS that indicate that everything in between them    -->
<!-- is HTML.  Every HTML document must begin with <html> and end with   -->
<!-- </html>                                                             -->
                                                       
<!-- Also notice how the tags are NESTED - each pair of opening and      -->
<!-- closing tags is contained within another pair of tags.  The         -->
<!-- <head></head> tags, for example, are nested within the <html></html> -->
<!-- tags.  The <title></title>tags are nested within the <head></head>  -->
<!-- tags, and so on.  -->

<!-- Every html document contains exactly one <html> element.           -->
<!-- Every <html> element contains exactly one <head> and one <body>    -->
<!-- element.                                                           -->

<html>

  <head>
    <title>
      Getting Started with HTML: File1
    </title>
  </head>

  <body>
    <h1>
      Getting Started with HTML
    </h1>
    <p>
      This is a very very simple example of an HTML document. In
      your web browser, click "View -- Source" to see the actual
      text of the HTML file. Notice all the things in the actual
      file that are not rendered by the browser.
    </p>
  </body>

</html>
