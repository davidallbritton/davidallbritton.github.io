<?xml version="1.0" encoding="iso-8859-1" ?>

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Frameset//EN"
   "http://www.w3.org/TR/xhtml1/DTD/xhtml1-frameset.dtd">

<html xmlns = "http://www.w3.org/1999/xhtml" >

<!-- a template for frameset XHTML 1.0 documents -->
<!-- (for using frames in web pages)             -->
<!-- by David Allbritton -->

  <head>
    <title></title>
  </head>

<!-- The example here has 2 frames side by side                  -->
<!-- Use "rows" in place of "cols" for vertically stacked frames -->
  <frameset cols  = "100,*">
      <frame name = "leftframe" src = "nav.html" />
      <frame name = "rightframe" src = "main.html" />    

      <noframes>
         <p>This page uses frames, but your browser doe not support them.</p>
      </noframes>
  </frameset>
</html>
